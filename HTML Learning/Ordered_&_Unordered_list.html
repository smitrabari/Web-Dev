<!DOCTYPE html>
<html>
<head>
	<title>Ordered & Unordered list</title>
</head>
<body>
	<ol>
		<li>Coffee</li>
		<li>Milk</li>
		<li>Tea</li>
	</ol>
	<ul>
		<li>Coffee</li>
		<li>Milk</li>
		<li>Tea</li>
	</ul>
	<dl>
		<dt>Coffee</dt>
		<dd>Hot Coffee</dd>
		<dd>Cold Coffee</dd>
		<dd>Oreo Coffee</dd>
		<dd>Latte Coffee</dd>
	</dl>
</body>
</html>
