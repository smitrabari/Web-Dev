<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Form</title>
	<link rel="icon" href="images\favicon.ico">
</head>
<body>
	<form>
		<fieldset>
			<legend>
				Personal
			</legend>
			<label for = "fname">First Name - </label>
			<input type="text" id="fname">
			<br>
			<br>
			<label for = "lname">Last Name - </label>
			<input type="text" id="lname">
			<br>
			<br>
			<label for="dob">DOB</label>
			<input type="date" id="dob">
			<br>
			<br>
			<label for="mail">E Mail</label>
			<input type="email" id="mail">
		</fieldset>
		<br>
		<fieldset>
			<legend>
				What is your Ocupation
			</legend>
			<input type="radio" id="Jobless">
			<label for="Jobless">Jobless</label><br>
			<input type="radio" id="Working">
			<label for="Working">Working</label><br>
			<input type="radio" id="Fresher">
			<label for="Fresher">Fresher</label><br>
			<input type="radio" id="Student">
			<label for="Student">Student</label><br>
		</fieldset>
		<br>
		<fieldset>
			<legend>
				Skill
			</legend>
			<input type="checkbox" id="HTML">
			<label for="HTML">HTML</label><br>
			<input type="checkbox" id="CSS">
			<label for="CSS">CSS</label><br>
			<input type="checkbox" id="JS">
			<label for="JS">JS</label><br>
			<input type="checkbox" id="C">
			<label for="C">C</label><br>
			<input type="checkbox" id="C++">
			<label for="C++">C++</label><br>
			<input type="checkbox" id="Java">
			<label for="Java">Java</label><br>
			<input type="checkbox" id="SQL">
			<label for="SQL">SQL</label><br>
		</fieldset>
		<br>
		<fieldset>
			<legend>
				College
			</legend>
			<select>
				<option>PPSU</option>
				<option>PU</option>
				<option>Maliba</option>
				<option>Tajpor</option>
				<option>Svnit</option>
				<option>Gov. Bharuch</option>
			</select>
		</fieldset>
		<br>
		<fieldset>
			<legend>
				Review
			</legend>
			<textarea name="Review"></textarea>
		</fieldset>
		<br>
		<fieldset>
			<legend>
				Password
			</legend>
			<label for = "Password">Create Password</label>
			<input type="Password" id ="Password"></input>
		</fieldset>
		<input type="Reset" value="Reset">
		<input type="submit" value="submit">
	</form>
</body>
</html>
