<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Border</title>
	<style>
		h1{
			border-style: solid;
			border-width: 5px 10px;
			border-color: blue red;
		}
	</style>
</head>
<body>
	<p style="border-style: dotted;">This is Dotted Border!!</p>
	<p style="border-style: dashed;">This is Dashed Border!!</p>
	<p style="border-style: solid;">This is solid Border!!</p>
	<p style="border-style: double;">This is Double Border!!</p>
	<p style="border-style: groove;">This is Groove Border!!</p>
	<p style="border-style: ridge;">This is Ridge Border!!</p>
	<p style="border-style: inset;">This is Inset Border!!</p>
	<p style="border-style: outset;">This is Outset Border!!</p>
	<p style="border-style: none;">This is None Border!!</p>
	<p style="border-style: Hidden;">This is Hidden Border!!</p>
	<h1>Border Width</h1>
	<h2 style="border-style: solid;
				border-color: white;
				border-left-color: blue;
				border-left-width: 5px;">Smit Rabari</h2>
</body>
</html>
